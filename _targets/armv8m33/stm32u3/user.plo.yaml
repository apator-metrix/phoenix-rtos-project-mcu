magic: '{{ env.MAGIC_USER_SCRIPT }}'
size: '{{ nvm.flash0.kernel.offs - nvm.flash0.user.offs }}'
is_relative: True

contents:
  - kernelimg {{ env.BOOT_DEVICE }}
  - app {{ env.BOOT_DEVICE }} -x stm32l4-multi {{ env.BOOT_DEVICE }} ram;io
  - app {{ env.BOOT_DEVICE }} -x psh {{ env.BOOT_DEVICE }} ram
  - wait 1000
  - go!
